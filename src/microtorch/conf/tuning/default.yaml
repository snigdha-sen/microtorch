num_layers:
  type: int
  low: 1
  high: 6

hidden_size:
  type: categorical
  choices: [32, 64, 128, 256, 512]

patience:
  type: categorical
  choices: [50, 100, 200]

dropout_frac:
  type: float
  low: 0.0
  high: 0.2

lr:
  type: float
  low: 1e-4
  high: 5e-3
  log: true

activation:
  type: categorical
  choices: ["relu", "prelu", "tanh", "elu"]